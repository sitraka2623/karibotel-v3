name: Deploy Next.js to cPanel Node.js

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build Next.js
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: https://karibotel.aris-cc.com
          NEXT_PUBLIC_API_URL: https://karibotel.aris-cc.com/api

      - name: 🚀 Prepare files for cPanel
        # On déplace les fichiers statiques dans le dossier standalone pour que tout soit regroupé
        run: |
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.SERVER }}
          username: ${{ secrets.FTP_NAME }}
          password: ${{ secrets.FTP_PASS }}
          port: 21
          # On déploie le contenu du dossier standalone généré par Next.js
          local-dir: ./.next/standalone/
          server-dir: /
